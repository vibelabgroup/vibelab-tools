services:
  vibelab-api:
    image: node:18-alpine
    container_name: vibelab-api
    working_dir: /app
    environment:
      - ADMIN_KEY=vibelab2024
    volumes:
      - ./server:/app
      - vibelab_data:/app/data
    command: sh -c "npm install && npm start"
    networks:
      - traefik-proxy

  vibelab-tools:
    image: nginx:alpine
    container_name: vibelab-tools
    restart: always
    depends_on:
      - vibelab-api
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vibelab-tools.rule=Host(`tools.vibelab.cloud`)"
      - "traefik.http.routers.vibelab-tools.entrypoints=websecure"
      - "traefik.http.routers.vibelab-tools.tls.certresolver=letsencrypt"
      - "traefik.http.services.vibelab-tools.loadbalancer.server.port=80"
    networks:
      - traefik-proxy

volumes:
  vibelab_data:

networks:
  traefik-proxy:
    external: true